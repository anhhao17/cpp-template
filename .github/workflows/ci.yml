name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  native:
    name: native (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [ native, native-asan ]
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get install -y cmake ninja-build
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build build/${{ matrix.preset }}
      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  # ── SE05x + wolfSSL software simulator (full integration tests) ────────────
  se05x-sim:
    name: SE05x simulator tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get install -y cmake ninja-build
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            simulators/SE050Sim/se050-sim/target
          key: ${{ runner.os }}-se050-sim-${{ hashFiles('simulators/SE050Sim/se050-sim/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-se050-sim-
      - name: Clone wolfSSL SE050 simulator
        run: |
          git clone --depth 1 https://github.com/wolfSSL/simulators simulators
      - name: Build tcp_server
        run: |
          cd simulators/SE050Sim/se050-sim
          cargo build --release --bin tcp_server
      - name: Start simulator in background
        run: |
          simulators/SE050Sim/se050-sim/target/release/tcp_server &
          echo "SIM_PID=$!" >> $GITHUB_ENV
          # Wait until port 8050 is accepting connections (up to 10s).
          for i in $(seq 1 20); do
            nc -z 127.0.0.1 8050 2>/dev/null && echo "Simulator ready" && break
            sleep 0.5
          done
      - name: Configure (sim transport, tests ON)
        run: cmake --preset se05x-sim
      - name: Build
        run: cmake --build build/se05x-sim
      - name: Run SE integration tests against simulator
        env:
          EX_SSS_BOOT_SSS_PORT: "127.0.0.1:8050"
        run: ctest --preset se05x-sim --output-on-failure
      - name: Stop simulator
        if: always()
        run: kill $SIM_PID 2>/dev/null || true

  # ── SE05x port: compile check (socket preset, no hardware/simulator) ──────
  se05x-build:
    name: SE05x compile check (socket)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get install -y cmake ninja-build
      - name: Configure (socket transport, tests ON)
        run: cmake --preset se05x-socket
      - name: Build
        run: cmake --build build/se05x-socket
      - name: Test (SE tests skip; non-SE tests run)
        # EX_SSS_BOOT_SSS_PORT unset → all SE tests report SKIPPED, not FAILED.
        run: ctest --preset se05x-socket --output-on-failure
      - name: Smoke-test se_mtls_client (software fallback, no SE hardware)
        run: |
          # EX_SSS_BOOT_SSS_PORT not set → software key fallback, should exit 0
          ./build/se05x-socket/examples/example_se_mtls_client

  asio:
    name: Asio transport
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get install -y cmake ninja-build
      - name: Configure (Asio transport)
        run: |
          cmake -S . -B build/asio -G Ninja \
            -DETLX_TRANSPORT=asio \
            -DETLX_BUILD_TESTS=ON \
            -DETLX_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build build/asio
      - name: Test
        run: ctest --test-dir build/asio --output-on-failure

  aarch64:
    name: aarch64 cross + qemu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get install -y cmake ninja-build \
            g++-aarch64-linux-gnu qemu-user-static
      - name: Configure
        run: cmake --preset aarch64
      - name: Build
        run: cmake --build build/aarch64
      - name: Test (under qemu)
        run: ctest --preset aarch64 --output-on-failure
